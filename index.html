<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniLearn - Empower Your Learning</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <header class="bg-white shadow">
        <div class="container mx-auto px-4 py-5 flex justify-between items-center">
            <div class="text-2xl font-bold">
                <img src="logo.png" alt="Logo" class="h-10 inline">
                OmniLearn
            </div>
            <nav>
                <ul class="flex space-x-4">
                    <li><button class="text-gray-700 hover:text-blue-500">Courses</button></li>
                    <li><button class="text-gray-700 hover:text-blue-500">About</button></li>
                    <li><button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Login</button></li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="flex items-center justify-center h-screen">
        <div class="text-center">
            <h1 class="text-4xl font-bold mb-5">Empower Your Learning</h1>
            <div class="space-x-4">
                <button class="bg-blue-500 text-white px-5 py-3 rounded hover:bg-blue-600">I am a Teacher</button>
                <button class="bg-green-500 text-white px-5 py-3 rounded hover:bg-green-600">I am a Student</button>
            </div>
        </div>
    </main>
</body>
</html>
