<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniLearn - Empower Your Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white">
    <!-- Navigation Header -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex-shrink-0 flex items-center">
                    <div class="text-2xl font-bold text-blue-600">OmniLearn</div>
                </div>

                <!-- Navigation Links -->
                <div class="hidden md:flex space-x-8">
                    <a href="#courses" class="text-gray-700 hover:text-blue-600 font-medium transition">
                        Courses
                    </a>
                    <a href="#about" class="text-gray-700 hover:text-blue-600 font-medium transition">
                        About
                    </a>
                </div>

                <!-- Login Button -->
                <div>
                    <button class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition font-medium">
                        Login
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="bg-gradient-to-br from-blue-50 to-indigo-100 py-20 md:py-32">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center">
                <!-- Main Title -->
                <h1 class="text-4xl md:text-6xl font-bold text-gray-900 mb-6">
                    Empower Your Learning
                </h1>

                <!-- Subtitle -->
                <p class="text-lg md:text-xl text-gray-600 mb-12 max-w-2xl mx-auto">
                    Join thousands of learners and educators on a platform designed to inspire, teach, and grow together.
                </p>

                <!-- Action Buttons -->
                <div class="flex flex-col md:flex-row gap-6 justify-center items-center">
                    <!-- I am a Teacher Button -->
                    <button class="bg-blue-600 text-white px-8 py-4 rounded-lg hover:bg-blue-700 transition font-semibold text-lg shadow-lg hover:shadow-xl transform hover:scale-105">
                        I am a Teacher
                    </button>

                    <!-- I am a Student Button -->
                    <button class="bg-indigo-600 text-white px-8 py-4 rounded-lg hover:bg-indigo-700 transition font-semibold text-lg shadow-lg hover:shadow-xl transform hover:scale-105">
                        I am a Student
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer (Optional) -->
    <footer class="bg-gray-900 text-gray-300 py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p>&copy; 2026 OmniLearn. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
